  /api/accounts/users/:
    get:
      operationId: accounts_users_list
      parameters:
      - in: query
        name: is_active
        schema:
          type: boolean
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - in: query
        name: role
        schema:
          type: string
          enum:
          - ADMIN
          - EMPLOYEE
          - SUPER_ADMIN
          - TRADER
          - USER
        description: |-
          * `SUPER_ADMIN` - Super Admin
          * `ADMIN` - Admin
          * `TRADER` - Trader
          * `EMPLOYEE` - Employee
          * `USER` - User
