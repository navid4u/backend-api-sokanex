components:
  schemas:
    ApproveSignalResponse:
      type: object
      properties:
        message:
          type: string
      required:
      - message
    ArticleDetail:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        title:
          type: string
          maxLength: 250
        slug:
          oneOf:
          - type: string
            pattern: ^[-\w]+$
            maxLength: 280
          - type: string
            maxLength: 0
        summary:
          type: string
        cover_image:
          type: string
          format: uri
          nullable: true
        category:
          allOf:
          - $ref: '#/components/schemas/Category'
          readOnly: true
        author:
          type: string
          readOnly: true
        status:
          $ref: '#/components/schemas/ContentStatusEnum'
        published_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        content:
          type: string
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - author
      - category
      - content
      - created_at
      - id
      - title
      - updated_at
    ArticleList:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        title:
          type: string
          maxLength: 250
        slug:
          oneOf:
          - type: string
            pattern: ^[-\w]+$
            maxLength: 280
          - type: string
            maxLength: 0
        summary:
          type: string
        cover_image:
          type: string
          format: uri
          nullable: true
        category:
          allOf:
          - $ref: '#/components/schemas/Category'
          readOnly: true
        author:
          type: string
          readOnly: true
        status:
          $ref: '#/components/schemas/ContentStatusEnum'
        published_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - author
      - category
      - created_at
      - id
      - title
    ArticleWrite:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        title:
          type: string
          maxLength: 250
        slug:
          type: string
          readOnly: true
          pattern: ^[-\w]+$
        summary:
          type: string
        content:
          type: string
        cover_image:
          type: string
          format: uri
          nullable: true
        category:
          type: integer
          nullable: true
        status:
          $ref: '#/components/schemas/ContentStatusEnum'
        published_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - content
      - created_at
      - id
      - published_at
      - slug
      - title
      - updated_at
    ArticleWriteRequest:
      type: object
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 250
        summary:
          type: string
        content:
          type: string
          minLength: 1
        cover_image:
          type: string
          format: binary
          nullable: true
        category:
          type: integer
          nullable: true
        status:
          $ref: '#/components/schemas/ContentStatusEnum'
      required:
      - content
      - title
    BrokerDetail:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 150
        slug:
          oneOf:
          - type: string
            pattern: ^[-\w]+$
            maxLength: 180
          - type: string
            maxLength: 0
        short_description:
          type: string
          maxLength: 300
        logo:
          type: string
          format: uri
          nullable: true
        country:
          type: string
          maxLength: 100
        regulation:
          type: string
          maxLength: 250
        minimum_deposit:
          type: string
          format: decimal
          pattern: ^-?\d{0,18}(?:\.\d{0,2})?$
          nullable: true
        rating:
          type: string
          format: decimal
          pattern: ^-?\d{0,1}(?:\.\d{0,1})?$
        features: {}
        sort_order:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
        is_active:
          type: boolean
        description:
          type: string
        website_url:
          type: string
          format: uri
          maxLength: 500
        registration_url:
          oneOf:
          - type: string
